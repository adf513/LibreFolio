extra_javascript:
  # MathJax configuration (must load before MathJax)
  - javascripts/mathjax.js
  # Library loader with local cache + CDN fallback
  - javascripts/lib-loader.js
  # Dashboard connectivity check
  - javascripts/dashboard-check.js
  # App ↔ MkDocs sync (theme from frontend → MkDocs Material, must load before lang selector)
  - javascripts/app-sync.js
  # Site-wide language selector (controls i18n + gallery screenshots)
  - javascripts/site-lang-selector.js
  # Gallery image loader - auto-resolves screenshot paths on any page
  - javascripts/gallery-img-loader.js
  # Buy Me a Coffee widget + header button
  - javascripts/bmc-widget.js

