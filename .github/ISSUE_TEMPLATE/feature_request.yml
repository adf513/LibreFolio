name: "🚀 Feature Request"
description: "Suggest a new idea or specific functionality for LibreFolio"
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe the use case and proposal below.
  - type: textarea
    id: problem
    attributes:
      label: "Is your feature request related to a problem?"
      description: "A clear and concise description of what the problem is."
      placeholder: "I find it difficult to do X because..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "Proposed Solution"
      description: "Describe the solution or feature you'd like to see implemented."
      placeholder: "I would like a button that does Y..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Alternative Solutions"
      description: "Describe any alternative solutions or features you've considered."
      placeholder: "We could also do Z instead, which..."
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: "Additional Context"
      description: "Any other context, mockups, or screenshots related to the feature request."
    validations:
      required: false
