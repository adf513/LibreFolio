# =============================================================================
# LibreFolio — Docker Compose
# =============================================================================
# Prerequisites:
#   - Copy .env.example to .env and edit parameters:
#       cp .env.example .env
#   - Ensure your user is in the docker group:
#       sudo usermod -aG docker $USER && newgrp docker
#
# Usage:
#   1. Build image:     ./dev.py docker build
#   2. Start:           docker compose up -d
#   3. Access:          http://localhost:${PORT:-8000}
#
# Test mode (optional):
#   ./dev.py docker exec server --test            # start test server on :8001
#   ./dev.py docker exec test db populate --force --with-static
#   Access:  http://localhost:${TEST_PORT:-8001}
# =============================================================================

services:
  librefolio:
    image: librefolio:latest
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: librefolio
    # Run as non-root. Default 1000:1000 matches the 'librefolio' user in the image.
    # Override in .env if your host user has a different UID/GID (see docs).
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
      - "${TEST_PORT:-8001}:8001"
    volumes:
      - ./LibreFolio-data:/app/backend/data/prod-docker
    env_file: .env
    # PRIORITY: 'environment' values below OVERRIDE same-named keys from env_file.
    # These overrides are mandatory inside the container:
    #   - LIBREFOLIO_DATA_DIR must match the container-side bind-mount path.
    #   - HOST must be 0.0.0.0 so the server is reachable from outside the container
    #     (even if the user sets HOST=127.0.0.1 in .env for local development).
    environment:
      - LIBREFOLIO_DATA_DIR=/app/backend/data/prod-docker
      - HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/system/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

