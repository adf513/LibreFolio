name: "🐛 Bug Report"
description: "Report an issue or unexpected behavior in LibreFolio"
title: "[BUG] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible to help us reproduce and resolve the issue.
  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      description: "A clear and concise description of what the bug is."
      placeholder: "When I click on X, Y happens instead of Z..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: "How do we trigger this bug? Please list step-by-step."
      placeholder: |
        1. Go to page '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      description: "What did you expect to happen?"
      placeholder: "The chart should show Z..."
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: "Deployment Method"
      description: "How are you running LibreFolio?"
      options:
        - "Docker (Official pre-built image)"
        - "Docker (Built from source)"
        - "Host Installation (Pipenv)"
        - "CasaOS / Portainer"
        - "Other / Custom"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: "LibreFolio Version"
      description: "Which version are you using? (Check settings or docker tag)"
      placeholder: "e.g. v0.10.0, latest, dev"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: "Environment Information"
      description: "OS version and Web Browser used."
      placeholder: "e.g. macOS Sequoia - Chrome 125, Windows 11 - Firefox"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: "Logs or Diagnostics"
      description: "Please paste any relevant server logs or console errors here."
      render: bash
      placeholder: "Docker logs, python stack traces, console errors..."
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: "Screenshots or Mockups"
      description: "Drag and drop any images showing the bug here."
    validations:
      required: false
