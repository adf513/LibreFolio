<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1" name="viewport" />
        <link href="/favicon.png" rel="icon" type="image/png" />
        <title>LibreFolio</title>
        <script>
            // Anti-FOUC: apply theme class before first paint.
            // Reads 'librefolio-theme' from localStorage (values: 'light' | 'dark' | '' for auto).
            (function () {
                var stored = '';
                try {
                    stored = localStorage.getItem('librefolio-theme') || '';
                } catch (e) {}
                var theme = stored === 'dark' ? 'dark' : stored === 'light' ? 'light' : window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                document.documentElement.classList.add(theme);
            })();
        </script>
        <style>
            #app-splash {
                position: fixed;
                inset: 0;
                z-index: 9999;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background-color: #f5f4ef;
                transition: opacity 0.3s ease;
            }
            #app-splash.fade-out {
                opacity: 0;
                pointer-events: none;
            }
            .splash-logo {
                width: 80px;
                height: 80px;
                margin-bottom: 24px;
                border-radius: 16px;
                background: #ffffff;
                padding: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            }
            .splash-logo img {
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
            }
            .splash-spinner {
                width: 36px;
                height: 36px;
                border: 3px solid rgba(0, 0, 0, 0.1);
                border-top-color: #1a4031;
                border-radius: 50%;
                animation: splash-spin 0.8s linear infinite;
            }
            @keyframes splash-spin {
                to {
                    transform: rotate(360deg);
                }
            }
            /* Dark mode splash — applied via html.dark class set by anti-FOUC script */
            html.dark #app-splash {
                background-color: #0f172a;
            }
            html.dark .splash-spinner {
                border-color: rgba(255, 255, 255, 0.1);
                border-top-color: #86efac;
            }
        </style>
        %sveltekit.head%
    </head>
    <body data-sveltekit-preload-data="hover">
        <div id="app-splash">
            <div class="splash-logo"><img alt="LibreFolio" src="/logo.png" /></div>
            <div class="splash-spinner"></div>
        </div>
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
