site_name: LibreFolio Docs
site_url: https://alfystar.github.io/LibreFolio/
repo_url: https://github.com/Alfystar/LibreFolio
repo_name: Alfystar/LibreFolio

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - content.code.copy
  icon:
    repo: fontawesome/brands/github
  logo: static/logo.png
  favicon: static/favicon.png

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  # Math support (LaTeX)
  - pymdownx.arithmatex:
      generic: true
  # Emoji support (Updated syntax)
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  # MathJax configuration (must load before MathJax)
  - javascripts/mathjax.js
  # Library loader with local cache + CDN fallback
  - javascripts/lib-loader.js
  # Dashboard connectivity check
  - javascripts/dashboard-check.js
  # Gallery language selector (for gallery pages)
  - javascripts/gallery-lang-selector.js
  # Gallery image loader - auto-resolves screenshot paths on any page
  - javascripts/gallery-img-loader.js

